<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Healthy Exposure — Home Assessment</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest: #1B4332;
      --green-dark: #2D5A3D;
      --green-spring: #4A7C59;
      --gold: #C8A84E;
      --gold-light: #E8D48B;
      --gold-accent: #D4A843;
      --brown-deep: #5C3D2E;
      --brown-warm: #8B5E3C;
      --cream: #FAF8F5;
      --cream-dark: #F0EBE3;
      --charcoal: #2D2D2D;
      --white-soft: rgba(255,255,255,0.95);
      --red-soft: #C0392B;
      --orange-soft: #E67E22;
      --blue-soft: #2980B9;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Nunito Sans', sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      min-height: 100vh;
    }
    h1,h2,h3,h4 { font-family: 'Cormorant Garamond', serif; font-weight: 600; }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--forest), var(--green-dark));
      color: var(--white-soft);
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 1.5rem; letter-spacing: 1px; }
    .header .subtitle { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }
    .progress-badge {
      background: var(--gold-accent);
      color: var(--brown-deep);
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    /* Whole-Home Progress */
    .home-progress {
      background: var(--cream-dark);
      padding: 10px 24px;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 62px;
      z-index: 99;
    }
    .progress-track {
      background: #ddd;
      border-radius: 10px;
      height: 8px;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, var(--green-spring), var(--gold-accent));
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s ease;
    }
    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--brown-warm);
      margin-top: 5px;
    }

    /* Card Grid */
    .grid-screen {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 20px;
    }
    .grid-intro {
      text-align: center;
      margin-bottom: 24px;
    }
    .grid-intro h2 { font-size: 1.8rem; color: var(--forest); margin-bottom: 6px; }
    .grid-intro p { color: var(--brown-warm); font-size: 0.95rem; max-width: 600px; margin: 0 auto; }

    .area-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .area-card {
      background: var(--white-soft);
      border: 2px solid var(--cream-dark);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .area-card:hover {
      border-color: var(--gold);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }
    .area-card.complete { border-color: var(--green-spring); }
    .area-card.partial { border-color: var(--gold-accent); }

    .card-icon {
      font-size: 2rem;
      margin-bottom: 8px;
      display: block;
    }
    .area-card h4 {
      font-size: 1.1rem;
      color: var(--forest);
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 0.78rem;
      color: var(--brown-warm);
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .card-progress {
      height: 4px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
    }
    .card-progress-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--green-spring);
      transition: width 0.4s ease;
    }
    .card-status {
      font-size: 0.72rem;
      font-weight: 700;
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .card-status.complete { color: var(--green-spring); }
    .card-status.partial { color: var(--gold-accent); }
    .card-status.pending { color: var(--brown-warm); }

    /* Assessment Screen */
    .assess-screen {
      max-width: 720px;
      margin: 24px auto;
      padding: 0 20px;
      display: none;
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--green-spring);
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      margin-bottom: 16px;
      padding: 6px 0;
    }
    .back-btn:hover { color: var(--forest); }

    /* Area Header */
    .area-header {
      background: linear-gradient(135deg, var(--forest), var(--green-dark));
      color: var(--white-soft);
      padding: 24px;
      border-radius: 12px 12px 0 0;
    }
    .area-header h2 { font-size: 1.5rem; margin-bottom: 4px; }
    .area-header p { font-size: 0.85rem; opacity: 0.85; }

    /* Sub-area progress */
    .subarea-progress {
      background: var(--cream-dark);
      padding: 10px 24px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      border-bottom: 1px solid #ddd;
    }
    .subarea-pip {
      padding: 5px 12px;
      border-radius: 14px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid var(--cream-dark);
      background: white;
      color: var(--brown-warm);
      transition: all 0.2s;
    }
    .subarea-pip.active { border-color: var(--gold-accent); background: var(--gold-light); color: var(--brown-deep); }
    .subarea-pip.done { border-color: var(--green-spring); background: #e0f0e0; color: var(--green-spring); }

    /* Question Card */
    .question-card {
      background: var(--white-soft);
      border: 2px solid var(--gold-accent);
      border-radius: 0 0 12px 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .question-body { padding: 24px; }

    .q-label {
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--brown-warm);
      margin-bottom: 8px;
    }
    .q-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      line-height: 1.6;
      color: var(--brown-deep);
      margin-bottom: 16px;
    }

    /* Answer options */
    .answer-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .answer-opt {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: 2px solid var(--cream-dark);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .answer-opt:hover { border-color: var(--gold); background: #faf6eb; }
    .answer-opt.selected { border-color: var(--green-spring); background: #eef5e9; }
    .answer-opt.risk-high.selected { border-color: var(--red-soft); background: #fde8e8; }
    .answer-opt.risk-med.selected { border-color: var(--orange-soft); background: #fef3e0; }
    .answer-opt input { display: none; }
    .opt-marker {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--cream-dark);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem; color: var(--brown-deep); flex-shrink: 0;
    }
    .answer-opt.selected .opt-marker { background: var(--green-spring); color: white; }
    .answer-opt.risk-high.selected .opt-marker { background: var(--red-soft); }
    .answer-opt.risk-med.selected .opt-marker { background: var(--orange-soft); }
    .opt-text { font-size: 0.92rem; }

    /* Toxin Education Callout */
    .toxin-callout {
      background: linear-gradient(to right, #fdf8ec, #faf6eb);
      border-left: 4px solid var(--gold-accent);
      border-radius: 0 8px 8px 0;
      padding: 14px 18px;
      margin: 16px 0;
      display: none;
    }
    .toxin-callout.visible { display: block; }
    .toxin-callout .tc-title {
      font-weight: 700;
      font-size: 0.82rem;
      text-transform: uppercase;
      color: var(--gold-accent);
      margin-bottom: 6px;
    }
    .toxin-callout .tc-body {
      font-size: 0.88rem;
      color: var(--brown-deep);
      line-height: 1.6;
    }
    .toxin-callout .tc-eiv {
      margin-top: 8px;
      font-size: 0.82rem;
      color: var(--green-spring);
      font-weight: 600;
    }

    /* Custom Concern */
    .custom-concern {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--cream-dark);
    }
    .custom-concern label {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--brown-warm);
      display: block;
      margin-bottom: 6px;
    }
    .custom-concern textarea {
      width: 100%;
      min-height: 60px;
      padding: 10px;
      border: 2px solid var(--cream-dark);
      border-radius: 8px;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.9rem;
      resize: vertical;
      transition: border-color 0.2s;
    }
    .custom-concern textarea:focus { outline: none; border-color: var(--green-spring); }

    /* Navigation */
    .q-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: var(--cream-dark);
    }
    .nav-btn {
      padding: 11px 26px;
      border: none;
      border-radius: 6px;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }
    .nav-btn.prev { background: white; color: var(--brown-deep); border: 2px solid var(--cream-dark); }
    .nav-btn.prev:hover { border-color: var(--brown-warm); }
    .nav-btn.next { background: var(--forest); color: white; }
    .nav-btn.next:hover { background: var(--green-dark); }
    .nav-btn:disabled { opacity: 0.4; cursor: default; }
    .save-indicator { font-size: 0.78rem; color: var(--green-spring); font-weight: 600; }

    /* Results Screen */
    .results-screen {
      max-width: 800px;
      margin: 24px auto;
      padding: 0 20px;
      display: none;
    }
    .results-header {
      background: linear-gradient(135deg, var(--forest), var(--green-dark));
      color: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 24px;
    }
    .results-header h2 { font-size: 2rem; margin-bottom: 8px; }

    .score-ring {
      width: 120px; height: 120px;
      border-radius: 50%;
      border: 8px solid var(--gold-accent);
      display: flex; align-items: center; justify-content: center;
      margin: 16px auto;
      flex-direction: column;
    }
    .score-ring .score-val { font-size: 2.4rem; font-weight: 700; font-family: 'Cormorant Garamond', serif; }
    .score-ring .score-label { font-size: 0.7rem; opacity: 0.8; text-transform: uppercase; }

    .area-result {
      background: var(--white-soft);
      border: 2px solid var(--cream-dark);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .area-result.risk-high { border-left: 5px solid var(--red-soft); }
    .area-result.risk-med { border-left: 5px solid var(--orange-soft); }
    .area-result.risk-low { border-left: 5px solid var(--green-spring); }

    .ar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .ar-header h4 { font-size: 1.1rem; color: var(--forest); }
    .ar-score {
      font-weight: 700;
      font-size: 0.85rem;
      padding: 4px 12px;
      border-radius: 12px;
    }
    .ar-score.high { background: #fde8e8; color: var(--red-soft); }
    .ar-score.med { background: #fef3e0; color: var(--orange-soft); }
    .ar-score.low { background: #e0f0e0; color: var(--green-spring); }

    .ar-findings { font-size: 0.88rem; color: var(--brown-deep); line-height: 1.5; }
    .ar-action {
      margin-top: 8px;
      font-size: 0.82rem;
      color: var(--forest);
      font-weight: 600;
    }

    .results-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 30px 0;
      flex-wrap: wrap;
    }
    .action-btn {
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn.primary { background: var(--forest); color: white; }
    .action-btn.primary:hover { background: var(--green-dark); }
    .action-btn.secondary { background: white; color: var(--forest); border: 2px solid var(--forest); }
    .action-btn.secondary:hover { background: var(--cream-dark); }

    /* Disclaimer */
    .disclaimer {
      background: var(--cream-dark);
      padding: 16px 20px;
      border-radius: 8px;
      font-size: 0.78rem;
      color: var(--brown-warm);
      line-height: 1.5;
      margin: 24px 0;
    }

    @media (max-width: 600px) {
      .header { flex-direction: column; gap: 8px; text-align: center; padding: 14px 16px; }
      .area-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
      .area-card { padding: 14px; }
      .card-icon { font-size: 1.6rem; }
      .results-actions { flex-direction: column; }
      .action-btn { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div>
      <a href="index.html" style="color:inherit;text-decoration:none;"><h1>Healthy Exposure</h1></a>
      <div class="subtitle">Digital Home Assessment — Eliminate, Isolate, Ventilate</div>
    </div>
    <div class="progress-badge" id="homeBadge">0 / 15 Areas</div>
  </div>

  <!-- Whole-Home Progress -->
  <div class="home-progress">
    <div class="progress-track">
      <div class="progress-fill" id="homeProgressFill" style="width:0%"></div>
    </div>
    <div class="progress-text">
      <span id="homeProgressLabel">Select an area to begin your assessment</span>
      <span id="homeProgressPct">0%</span>
    </div>
  </div>

  <!-- Grid Screen -->
  <div class="grid-screen" id="gridScreen">
    <div class="grid-intro">
      <h2>Your Home Assessment</h2>
      <p>Walk through each area of your home. We'll help you identify environmental health risks and give you a clear action plan based on the EIV method.</p>
    </div>
    <div class="area-grid" id="areaGrid"></div>
  </div>

  <!-- Assessment Screen -->
  <div class="assess-screen" id="assessScreen">
    <button class="back-btn" id="backBtn">&larr; Back to all areas</button>
    <div class="area-header" id="areaHeader">
      <h2 id="areaTitle"></h2>
      <p id="areaDesc"></p>
    </div>
    <div class="subarea-progress" id="subareaNav"></div>
    <div class="question-card">
      <div class="question-body" id="questionBody"></div>
      <div class="q-nav">
        <button class="nav-btn prev" id="prevBtn" disabled>&larr; Previous</button>
        <span class="save-indicator" id="saveIndicator"></span>
        <button class="nav-btn next" id="nextBtn">Next &rarr;</button>
      </div>
    </div>
  </div>

  <!-- Results Screen -->
  <div class="results-screen" id="resultsScreen"></div>

<script>
(function() {
  'use strict';

  // ================================================================
  // ASSESSMENT DATA — 15 home areas, each with sub-areas and questions
  // Toxin education from "Environmental Health by Healthy Exposure"
  // by Capt. Darren J. Vigil, CIEC, ATP
  // ================================================================

  var AREAS = [
    {
      id: 'attic', icon: '🏚️', title: 'Attic',
      desc: 'Where temperature extremes, moisture, and air movement converge.',
      subareas: [
        {
          id: 'ventilation', label: 'Ventilation',
          questions: [
            {
              text: 'Does your attic have functional soffit vents (intake) AND ridge/gable vents (exhaust)?',
              options: [
                { text: 'Yes — both intake and exhaust vents are present and unblocked', score: 0, risk: 'low' },
                { text: 'Partial — some vents present but unsure if all are functional', score: 1, risk: 'med' },
                { text: 'No — missing intake or exhaust vents, or they appear blocked', score: 2, risk: 'high' },
                { text: 'I don\'t know / haven\'t checked', score: 1, risk: 'med' }
              ],
              education: {
                title: 'Why Attic Ventilation Matters',
                body: 'Proper attic ventilation requires balanced intake (soffit) and exhaust (ridge/gable). The rule: 1 sq ft of venting per 150 sq ft of attic floor. Without it, moisture from inside your home rises and condenses on cold surfaces — creating ideal mold conditions.',
                eiv: 'EIV: Ventilate — fresh air movement prevents moisture buildup and mold.'
              }
            },
            {
              text: 'In summer, does your upstairs feel significantly hotter than downstairs?',
              options: [
                { text: 'No — temperature is comfortable and even throughout', score: 0, risk: 'low' },
                { text: 'Somewhat — a few degrees warmer upstairs', score: 1, risk: 'med' },
                { text: 'Yes — noticeably hotter, uncomfortable', score: 2, risk: 'high' },
                { text: 'Not applicable / single story', score: 0, risk: 'low' }
              ],
              education: {
                title: 'Attic Heat Transfer',
                body: 'Attic temperatures can exceed 150°F in summer, radiating heat downward into living spaces. Poor ventilation and insulation make this worse — and excessive heat accelerates off-gassing from building materials.',
                eiv: 'EIV: Ventilate + Isolate — proper ventilation removes hot air; insulation isolates living space.'
              }
            }
          ]
        },
        {
          id: 'moisture', label: 'Moisture & Mold',
          questions: [
            {
              text: 'Have you noticed any dark staining on the underside of the roof sheathing or attic framing?',
              options: [
                { text: 'No staining visible', score: 0, risk: 'low' },
                { text: 'Minor discoloration in a small area', score: 1, risk: 'med' },
                { text: 'Visible dark stains or suspected mold on framing', score: 2, risk: 'high' },
                { text: 'I haven\'t inspected my attic', score: 1, risk: 'med' }
              ],
              education: {
                title: 'Hidden Attic Mold',
                body: 'The first sign of a roof leak is often NOT water dripping inside — it\'s mold in the attic or dark water staining on sheathing. Colonies can cover up to 50% of framing before anyone notices. Mold spores are then drawn down into living spaces by HVAC systems.',
                eiv: 'EIV: Eliminate the moisture source (fix leak), then remediate mold growth.'
              }
            },
            {
              text: 'Is insulation in your attic dry and evenly distributed, or do you see compressed/wet areas?',
              options: [
                { text: 'Dry and even — looks well-maintained', score: 0, risk: 'low' },
                { text: 'Some uneven spots but appears mostly dry', score: 1, risk: 'med' },
                { text: 'Wet, compressed, or displaced insulation visible', score: 2, risk: 'high' },
                { text: 'I haven\'t checked', score: 1, risk: 'med' }
              ],
              education: {
                title: 'Insulation & Off-Gassing',
                body: 'Many fiberglass insulation products are treated with formaldehyde binders that off-gas — especially when heated. Wet insulation loses R-value and breeds mold. Compressed insulation creates thermal bridges.',
                eiv: 'EIV: Eliminate damaged insulation; Isolate with proper vapor barriers; Ventilate the attic space.'
              }
            }
          ]
        }
      ]
    },
    {
      id: 'roof', icon: '🏠', title: 'Roof & Exterior',
      desc: 'Your first defense against water intrusion.',
      subareas: [
        {
          id: 'integrity', label: 'Roof Integrity',
          questions: [
            {
              text: 'How old is your current roof covering?',
              options: [
                { text: 'Less than 10 years old', score: 0, risk: 'low' },
                { text: '10-20 years old', score: 1, risk: 'med' },
                { text: 'Over 20 years old or unknown', score: 2, risk: 'high' },
                { text: 'Recently replaced / I don\'t know', score: 1, risk: 'med' }
              ],
              education: {
                title: 'Roof Age & Water Intrusion',
                body: 'Aging roofs develop deteriorated flashing, cracked sealant, and worn shingles — all entry points for water. Water enters at roof penetrations (pipes, vents, chimneys, skylights) and contaminates attic framing with mold, which HVAC then distributes.',
                eiv: 'EIV: Eliminate water entry by maintaining the roof envelope.'
              }
            },
            {
              text: 'Do you have gutters, and are they functional with downspouts directing water away from the foundation?',
              options: [
                { text: 'Yes — gutters are clean and downspouts direct water 4+ feet from foundation', score: 0, risk: 'low' },
                { text: 'Gutters present but may need cleaning or repair', score: 1, risk: 'med' },
                { text: 'No gutters, or gutters are clogged/damaged', score: 2, risk: 'high' },
                { text: 'I\'m unsure', score: 1, risk: 'med' }
              ],
              education: {
                title: 'Drainage & Foundation Protection',
                body: 'The first line of defense against basement moisture is external drainage — functional gutters, downspouts directing water away, and grading that slopes away from the foundation. Failed drainage is the #1 cause of wet basements.',
                eiv: 'EIV: Eliminate water contact with the foundation through proper drainage.'
              }
            }
          ]
        }
      ]
    },
    {
      id: 'walls', icon: '🧱', title: 'Exterior Walls',
      desc: 'The building envelope between indoor and outdoor environments.',
      subareas: [
        {
          id: 'envelope', label: 'Building Envelope',
          questions: [
            {
              text: 'Do you see any cracks, gaps, or deteriorated caulk around windows, doors, or where siding meets trim?',
              options: [
                { text: 'No — caulk and sealants look intact', score: 0, risk: 'low' },
                { text: 'Minor gaps in a few spots', score: 1, risk: 'med' },
                { text: 'Multiple areas with cracked/missing caulk or visible gaps', score: 2, risk: 'high' },
                { text: 'I haven\'t inspected closely', score: 1, risk: 'med' }
              ],
              education: {
                title: 'Water Entry Through Walls',
                body: 'Water enters walls through cracks in siding, gaps at window/door junctions, utility penetrations, and deteriorated caulk. Hidden mold behind siding is a major health risk — wall cavities are dark, warm, and often damp.',
                eiv: 'EIV: Eliminate water entry points; Isolate with proper water-resistive barrier behind siding.'
              }
            },
            {
              text: 'Do you know if your wall insulation has a vapor barrier, and if it\'s on the correct side for your climate?',
              options: [

  var STORAGE_KEY = 'he_assessment_v1';
  var state = loadState();

  function loadState() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return JSON.parse(saved);
    } catch(e) {}
    return { answers: {}, concerns: {}, completed: {} };
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      showSaveIndicator('Saved');
    } catch(e) {
      showSaveIndicator('Save failed');
    }
  }

  function showSaveIndicator(msg) {
    var el = document.getElementById('saveIndicator');
    if (el) { el.textContent = msg; setTimeout(function(){ el.textContent = ''; }, 1500); }
  }

  // ================================================================
  // SCORING
  // ================================================================
  function getAreaScore(areaId) {
    var area = AREAS.find(function(a){ return a.id === areaId; });
    if (!area) return { score: 0, max: 0, pct: 0, answered: 0, total: 0 };
    var totalQ = 0, answered = 0, score = 0, maxScore = 0;
    area.subareas.forEach(function(sub) {
      sub.questions.forEach(function(q, qi) {
        totalQ++;
        maxScore += 2;
        var key = areaId + '.' + sub.id + '.' + qi;
        if (state.answers[key] !== undefined) {
          answered++;
          score += (state.answers[key].score || 0);
        }
      });
    });
    return { score: score, max: maxScore, pct: maxScore > 0 ? Math.round((score / maxScore) * 100) : 0, answered: answered, total: totalQ };
  }

  function getHomeScore() {
    var totalQ = 0, answered = 0, score = 0, maxScore = 0;
    AREAS.forEach(function(area) {
      var as = getAreaScore(area.id);
      totalQ += as.total;
      answered += as.answered;
      score += as.score;
      maxScore += as.max;
    });
    return { score: score, max: maxScore, pct: maxScore > 0 ? Math.round((score / maxScore) * 100) : 0, answered: answered, total: totalQ };
  }

  function riskLevel(pct) {
    if (pct >= 60) return 'high';
    if (pct >= 30) return 'med';
    return 'low';
  }

  // ================================================================
  // RENDER: Grid Screen
  // ================================================================
  function renderGrid() {
    document.getElementById('gridScreen').style.display = 'block';
    document.getElementById('assessScreen').style.display = 'none';
    document.getElementById('resultsScreen').style.display = 'none';

    var grid = document.getElementById('areaGrid');
    grid.innerHTML = '';

    var home = getHomeScore();
    updateHomeProgress(home);

    AREAS.forEach(function(area) {
      var as = getAreaScore(area.id);
      var card = document.createElement('div');
      card.className = 'area-card';
      if (as.answered === as.total && as.total > 0) card.className += ' complete';
      else if (as.answered > 0) card.className += ' partial';

      var statusText = 'Not started';
      var statusClass = 'pending';
      if (as.answered === as.total && as.total > 0) { statusText = 'Complete'; statusClass = 'complete'; }
      else if (as.answered > 0) { statusText = as.answered + ' / ' + as.total + ' answered'; statusClass = 'partial'; }

      card.innerHTML =
        '<span class="card-icon">' + area.icon + '</span>' +
        '<h4>' + area.title + '</h4>' +
        '<div class="card-desc">' + area.desc + '</div>' +
        '<div class="card-progress"><div class="card-progress-fill" style="width:' + (as.total > 0 ? Math.round((as.answered / as.total) * 100) : 0) + '%"></div></div>' +
        '<div class="card-status ' + statusClass + '">' + statusText + '</div>';

      card.onclick = function() { openArea(area.id); };
      grid.appendChild(card);
    });

    // Show results button if all complete
    if (home.answered === home.total && home.total > 0) {
      var resultsBtn = document.createElement('div');
      resultsBtn.style.cssText = 'text-align:center;margin-top:24px;';
      resultsBtn.innerHTML = '<button class="nav-btn next" style="padding:16px 40px;font-size:1.1rem;" onclick="window._showResults()">View Your Results &rarr;</button>';
      grid.parentNode.appendChild(resultsBtn);
    }
  }

  function updateHomeProgress(home) {
    var completedAreas = AREAS.filter(function(a) {
      var as = getAreaScore(a.id);
      return as.answered === as.total && as.total > 0;
    }).length;

    document.getElementById('homeBadge').textContent = completedAreas + ' / 15 Areas';
    document.getElementById('homeProgressFill').style.width = (home.total > 0 ? Math.round((home.answered / home.total) * 100) : 0) + '%';
    document.getElementById('homeProgressLabel').textContent = home.answered + ' of ' + home.total + ' questions answered';
    document.getElementById('homeProgressPct').textContent = (home.total > 0 ? Math.round((home.answered / home.total) * 100) : 0) + '%';
  }

  // ================================================================
  // RENDER: Assessment Screen
  // ================================================================
  var currentArea = null;
  var currentSubIdx = 0;
  var currentQIdx = 0;

  function openArea(areaId) {
    currentArea = AREAS.find(function(a){ return a.id === areaId; });
    if (!currentArea) return;
    currentSubIdx = 0;
    currentQIdx = 0;
    renderAssessment();
  }

  function renderAssessment() {
    document.getElementById('gridScreen').style.display = 'none';
    document.getElementById('assessScreen').style.display = 'block';
    document.getElementById('resultsScreen').style.display = 'none';

    var area = currentArea;
    document.getElementById('areaTitle').textContent = area.icon + ' ' + area.title;
    document.getElementById('areaDesc').textContent = area.desc;

    // Sub-area nav pips
    var nav = document.getElementById('subareaNav');
    nav.innerHTML = '';
    area.subareas.forEach(function(sub, si) {
      var pip = document.createElement('span');
      pip.className = 'subarea-pip';
      if (si === currentSubIdx) pip.className += ' active';
      // Check if all questions in this sub are answered
      var allDone = sub.questions.every(function(q, qi) {
        return state.answers[area.id + '.' + sub.id + '.' + qi] !== undefined;
      });
      if (allDone) pip.className += ' done';
      pip.textContent = sub.label;
      pip.onclick = function() { currentSubIdx = si; currentQIdx = 0; renderAssessment(); };
      nav.appendChild(pip);
    });

    renderQuestion();
    updateHomeProgress(getHomeScore());
  }

  function renderQuestion() {
    var area = currentArea;
    var sub = area.subareas[currentSubIdx];
    var q = sub.questions[currentQIdx];
    var key = area.id + '.' + sub.id + '.' + currentQIdx;

    var body = document.getElementById('questionBody');
    var html = '';

    html += '<div class="q-label">' + sub.label + ' — Question ' + (currentQIdx + 1) + ' of ' + sub.questions.length + '</div>';
    html += '<div class="q-text">' + q.text + '</div>';

    html += '<div class="answer-options">';
    q.options.forEach(function(opt, oi) {
      var selected = state.answers[key] && state.answers[key].idx === oi;
      var cls = 'answer-opt';
      if (opt.risk === 'high') cls += ' risk-high';
      else if (opt.risk === 'med') cls += ' risk-med';
      if (selected) cls += ' selected';

      html += '<div class="' + cls + '" data-idx="' + oi + '">' +
        '<input type="radio" name="q" value="' + oi + '"' + (selected ? ' checked' : '') + '>' +
        '<span class="opt-marker">' + String.fromCharCode(65 + oi) + '</span>' +
        '<span class="opt-text">' + opt.text + '</span>' +
        '</div>';
    });
    html += '</div>';

    // Toxin education callout
    var showEdu = state.answers[key] !== undefined;
    html += '<div class="toxin-callout' + (showEdu ? ' visible' : '') + '" id="toxinCallout">' +
      '<div class="tc-title">' + q.education.title + '</div>' +
      '<div class="tc-body">' + q.education.body + '</div>' +
      '<div class="tc-eiv">' + q.education.eiv + '</div>' +
      '</div>';

    // Custom concern
    var concernVal = state.concerns[key] || '';
    html += '<div class="custom-concern">' +
      '<label>Add your own concern about this area:</label>' +
      '<textarea id="concernInput" placeholder="Anything specific you\'ve noticed or want to flag...">' + concernVal + '</textarea>' +
      '</div>';

    body.innerHTML = html;

    // Bind answer clicks
    var opts = body.querySelectorAll('.answer-opt');
    opts.forEach(function(el) {
      el.addEventListener('click', function() {
        var idx = parseInt(el.getAttribute('data-idx'));
        var opt = q.options[idx];
        state.answers[key] = { idx: idx, score: opt.score, risk: opt.risk };
        saveState();
        renderQuestion();
      });
    });

    // Bind concern input
    var concernEl = document.getElementById('concernInput');
    if (concernEl) {
      concernEl.addEventListener('input', function() {
        state.concerns[key] = concernEl.value;
        saveState();
      });
    }

    // Nav buttons
    var prevBtn = document.getElementById('prevBtn');
    var nextBtn = document.getElementById('nextBtn');
    prevBtn.disabled = (currentSubIdx === 0 && currentQIdx === 0);

    // Determine if this is the last question in the area
    var isLastSub = currentSubIdx === area.subareas.length - 1;
    var isLastQ = currentQIdx === sub.questions.length - 1;
    if (isLastSub && isLastQ) {
      nextBtn.textContent = 'Finish Area →';
    } else {
      nextBtn.textContent = 'Next →';
    }
  }

  // Navigation
  document.getElementById('nextBtn').addEventListener('click', function() {
    var area = currentArea;
    var sub = area.subareas[currentSubIdx];
    if (currentQIdx < sub.questions.length - 1) {
      currentQIdx++;
    } else if (currentSubIdx < area.subareas.length - 1) {
      currentSubIdx++;
      currentQIdx = 0;
    } else {
      renderGrid();
      return;
    }
    renderAssessment();
  });

  document.getElementById('prevBtn').addEventListener('click', function() {
    var area = currentArea;
    if (currentQIdx > 0) {
      currentQIdx--;
    } else if (currentSubIdx > 0) {
      currentSubIdx--;
      var prevSub = area.subareas[currentSubIdx];
      currentQIdx = prevSub.questions.length - 1;
    }
    renderAssessment();
  });

  document.getElementById('backBtn').addEventListener('click', function() {
    renderGrid();
  });

  // ================================================================
  // RENDER: Results Screen
  // ================================================================
  window._showResults = function() {
    document.getElementById('gridScreen').style.display = 'none';
    document.getElementById('assessScreen').style.display = 'none';
    document.getElementById('resultsScreen').style.display = 'block';

    var home = getHomeScore();
    var overallRisk = riskLevel(home.pct);

    var riskLabel = overallRisk === 'high' ? 'High Risk' : overallRisk === 'med' ? 'Moderate Risk' : 'Low Risk';
    var riskColor = overallRisk === 'high' ? 'var(--red-soft)' : overallRisk === 'med' ? 'var(--orange-soft)' : 'var(--green-spring)';

    var html = '';

    // Report header
    html += '<div class="results-header">' +
      '<h2>Your Home Assessment Report</h2>' +
      '<p>Healthy Exposure — Eliminate, Isolate, Ventilate</p>' +
      '<div class="score-ring" style="border-color:' + riskColor + '">' +
        '<span class="score-val">' + home.pct + '%</span>' +
        '<span class="score-label">' + riskLabel + '</span>' +
      '</div>' +
      '<p style="font-size:0.85rem;opacity:0.8;margin-top:10px;">' + home.answered + ' questions answered across 15 areas</p>' +
      '<p style="font-size:0.78rem;opacity:0.6;margin-top:4px;">Generated ' + new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }) + '</p>' +
      '</div>';

    // Sort areas by risk (highest first)
    var areaResults = AREAS.map(function(area) {
      return { area: area, score: getAreaScore(area.id) };
    }).sort(function(a, b) { return b.score.pct - a.score.pct; });

    // Priority Action Plan (high-risk areas first)
    var highRisk = areaResults.filter(function(ar) { return riskLevel(ar.score.pct) === 'high'; });
    var medRisk = areaResults.filter(function(ar) { return riskLevel(ar.score.pct) === 'med'; });
    var totalEstMin = 0, totalEstMax = 0;

    if (highRisk.length > 0 || medRisk.length > 0) {
      html += '<div style="background:var(--white-soft);border:2px solid var(--red-soft);border-radius:12px;padding:24px;margin-bottom:24px;">';
      html += '<h3 style="font-family:Cormorant Garamond,serif;font-size:1.4rem;color:var(--red-soft);margin-bottom:4px;">Prioritized Remediation Plan</h3>';
      html += '<p style="font-size:0.85rem;color:var(--brown-warm);margin-bottom:16px;">Based on the EIV method — address highest-risk areas first. Costs are estimates from documented case studies.</p>';

      var priority = 1;
      var allPriority = highRisk.concat(medRisk);
      allPriority.forEach(function(ar) {
        var risk = riskLevel(ar.score.pct);
        var rem = REMEDIATION[ar.area.id] && REMEDIATION[ar.area.id][risk];
        if (!rem) return;

        var costParts = rem.cost.replace(/\$/g,'').replace(/,/g,'').split('–').map(function(s){ return parseInt(s.trim()); });
        if (costParts.length === 2) { totalEstMin += costParts[0]; totalEstMax += costParts[1]; }

        var urgencyColor = risk === 'high' ? 'var(--red-soft)' : 'var(--orange-soft)';
        var urgencyLabel = risk === 'high' ? 'URGENT' : 'MODERATE';

        html += '<div style="display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--cream-dark);">';
        html += '<div style="min-width:36px;height:36px;border-radius:50%;background:' + urgencyColor + ';color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;flex-shrink:0;">' + priority + '</div>';
        html += '<div style="flex:1;">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">';
        html += '<strong style="color:var(--forest);">' + ar.area.icon + ' ' + ar.area.title + '</strong>';
        html += '<span style="font-size:0.75rem;font-weight:700;padding:3px 10px;border-radius:10px;background:' + (risk === 'high' ? '#fde8e8' : '#fef3e0') + ';color:' + urgencyColor + ';">' + urgencyLabel + '</span>';
        html += '</div>';
        html += '<div style="font-size:0.88rem;color:var(--brown-deep);margin-top:4px;">' + rem.action + '</div>';
        html += '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:6px;font-size:0.8rem;color:var(--brown-warm);">';
        html += '<span>Est. cost: <strong>' + rem.cost + '</strong></span>';
        html += '<span>Timeline: <strong>' + rem.timeline + '</strong></span>';
        html += '</div>';
        html += '<div style="font-size:0.8rem;color:var(--green-spring);margin-top:4px;font-weight:600;">DIY first step: ' + rem.diy + '</div>';
        html += '</div></div>';
        priority++;
      });

      // Total cost estimate
      if (totalEstMax > 0) {
        html += '<div style="margin-top:16px;padding:14px;background:var(--cream-dark);border-radius:8px;text-align:center;">';
        html += '<div style="font-size:0.82rem;color:var(--brown-warm);text-transform:uppercase;font-weight:700;">Estimated Total Remediation Range</div>';
        html += '<div style="font-size:1.6rem;font-weight:700;color:var(--forest);font-family:Cormorant Garamond,serif;">$' + totalEstMin.toLocaleString() + ' – $' + totalEstMax.toLocaleString() + '</div>';
        html += '<div style="font-size:0.78rem;color:var(--brown-warm);margin-top:4px;">Based on documented case studies. Actual costs vary by region and scope.</div>';
        html += '</div>';
      }

      html += '</div>';
    }

    // Area-by-area detailed findings
    html += '<h3 style="font-family:Cormorant Garamond,serif;font-size:1.4rem;color:var(--forest);margin-bottom:16px;">Area-by-Area Findings</h3>';

    areaResults.forEach(function(ar) {
      var risk = riskLevel(ar.score.pct);
      var riskText = risk === 'high' ? 'High Risk' : risk === 'med' ? 'Moderate' : 'Low Risk';
      var scoreClass = risk;

      // Gather findings and education
      var findings = [];
      var educationItems = [];
      ar.area.subareas.forEach(function(sub) {
        sub.questions.forEach(function(q, qi) {
          var key = ar.area.id + '.' + sub.id + '.' + qi;
          var ans = state.answers[key];
          if (ans && ans.risk !== 'low') {
            findings.push(q.options[ans.idx].text);
            educationItems.push({ title: q.education.title, eiv: q.education.eiv });
          }
          if (state.concerns[key]) {
            findings.push('Your note: ' + state.concerns[key]);
          }
        });
      });

      html += '<div class="area-result risk-' + risk + '">' +
        '<div class="ar-header">' +
          '<h4>' + ar.area.icon + ' ' + ar.area.title + '</h4>' +
          '<span class="ar-score ' + scoreClass + '">' + riskText + '</span>' +
        '</div>';

      if (findings.length > 0) {
        html += '<div class="ar-findings"><ul style="margin:0;padding-left:18px;">';
        findings.forEach(function(f) {
          html += '<li style="margin-bottom:4px;">' + f + '</li>';
        });
        html += '</ul></div>';

        // EIV recommendations for flagged items
        if (educationItems.length > 0) {
          html += '<div style="margin-top:10px;padding:10px 14px;background:#f0f7f0;border-radius:6px;font-size:0.82rem;">';
          html += '<strong style="color:var(--green-spring);">EIV Recommendations:</strong>';
          var seen = {};
          educationItems.forEach(function(ei) {
            if (!seen[ei.eiv]) {
              html += '<div style="color:var(--brown-deep);margin-top:3px;">' + ei.eiv + '</div>';
              seen[ei.eiv] = true;
            }
          });
          html += '</div>';
        }
      } else {
        html += '<div class="ar-findings" style="color:var(--green-spring);">No concerns identified — this area looks good.</div>';
      }

      // Remediation details for non-low areas
      var rem = REMEDIATION[ar.area.id] && REMEDIATION[ar.area.id][risk];
      if (rem && risk !== 'low') {
        html += '<div class="ar-action" style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">';
        html += '<span>' + (risk === 'high' ? '⚠️' : '🔍') + ' ' + rem.action + '</span>';
        html += '<span style="font-size:0.78rem;color:var(--brown-warm);">(' + rem.cost + ', ' + rem.timeline + ')</span>';
        html += '</div>';
      }

      html += '</div>';
    });

    // Supplement Recommendations (based on detected exposures)
    var detectedExposures = {};
    AREAS.forEach(function(area) {
      area.subareas.forEach(function(sub) {
        sub.questions.forEach(function(q, qi) {
          var key = area.id + '.' + sub.id + '.' + qi;
          var ans = state.answers[key];
          if (ans && ans.risk !== 'low') {
            // Tag exposure types based on area
